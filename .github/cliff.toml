[remote.github]
owner = "AsterleedsGuild0"
repo = "MAAStarResonance"
#自用时换成自己的仓库owner和repo
#注意，本地git user需与github一致才能实现成功@
[changelog]
# 标题
header = """
# 更新日志
"""

body = """
{%- macro remote_url() -%}
  https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}
{%- endmacro -%}

{% macro print_commit(commit) -%}
    - {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
        {% if commit.breaking %}[**breaking**] {% endif %}\
        {{ commit.message | split(pat="\n") | first | upper_first }} \
        {% if commit.github.username %}@{{ commit.github.username }}{% else %}{{ commit.author.name }}{% endif %}
        {%- if commit.footers -%}
            {%- for footer in commit.footers -%}
                {%- if footer.token == "Co-authored-by" -%}
                    {%- set co_author_name = footer.value | split(pat=" <") | first | trim %} (Co-authored: {{ co_author_name }})
                {%- endif -%}
            {%- endfor -%}
        {%- endif %}
        {% set extra_lines = commit.message | split(pat="\n") | slice(start=1) %}
        {% if extra_lines | length > 0 %}
          {{ extra_lines | join(sep="\n      ") }}
        {% endif %}
{% endmacro -%}

{% if version %}\
    ## {{ version | trim_start_matches(pat="v") }} ({{ timestamp | date(format="%Y-%m-%d") }})
{% else %}\
    ## 未发布
{% endif %}\

{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits
    | filter(attribute="scope")
    | sort(attribute="scope") %}
        {{ self::print_commit(commit=commit) }}
    {%- endfor %}
    {% for commit in commits %}
        {%- if not commit.scope -%}
            {{ self::print_commit(commit=commit) }}
        {% endif -%}
    {% endfor -%}
{% endfor -%}
{%- if github -%}
{% if github.contributors | filter(attribute="is_first_time", value=true) | length != 0 %}
  ## 新贡献者 ❤️
{% endif %}\
{% for contributor in github.contributors | filter(attribute="is_first_time", value=true) %}
  * @{{ contributor.username }} made their first contribution
    {%- if contributor.pr_number %} in \
      [#{{ contributor.pr_number }}]({{ self::remote_url() }}/pull/{{ contributor.pr_number }}) \
    {%- endif %}
{%- endfor -%}
{%- endif %}
"""

# 尾部
footer = """
"""

[git]
# 过滤提交
conventional_commits = true # 使用约定式提交格式
filter_unconventional = true # 过滤非约定式提交（只保留标准格式的行）
# 拆分 commit message（处理 squash merge 中的多行提交）
split_commits = true
# 保留完整的 commit body
protect_breaking_commits = false
# 自定义 commit 分组规则
commit_parsers = [
    { message = "^feat",     group = "<!-- 0 -->✨ 新功能" },
    { message = "^fix",      group = "<!-- 1 -->🐛 Bug修复" },
    { message = "^patch",    group = "<!-- 1 -->🐛 Bug修复" },
    { message = "^perf",     group = "<!-- 2 -->🚀 性能优化" },
    { message = "^refactor", group = "<!-- 3 -->🎨 代码重构" },
    { message = "^format",   group = "<!-- 4 -->🥚 格式化" },
    { message = "^style",    group = "<!-- 5 -->💄 样式" },
    { message = "^docs",     group = "<!-- 6 -->📚 文档" },
    { message = "^chore",    group = "<!-- 7 -->🧹 日常维护" },
    { message = "^git",      group = "<!-- 7 -->🧹 日常维护" },
    { message = "^deps",     group = "<!-- 8 -->🧩 修改依赖" },
    { body = ".*security",   group = "<!-- 9 -->🔒 安全" },
    { message = "^revert",   group = "<!-- 10 -->🔁 还原提交" },
    { message = "^test",     group = "<!-- 11 -->🧪 测试" },
    { message = "^file",     group = "<!-- 12 -->📦 文件变更" },
    { message = "^tag",      group = "<!-- 13 -->📌 发布" },
    { message = "^config",   group = "<!-- 14 -->🔧 配置文件" },
    { message = "^ci",       group = "<!-- 15 -->⚙️ 持续集成" },
    { message = "^init",     group = "<!-- 16 -->🎉 初始化" },
]

# 忽略这些提交
ignore_tags = "rc"

# 排序规则
sort_commits = "oldest"

# 启用GitHub集成
[git.github]
commits = true
