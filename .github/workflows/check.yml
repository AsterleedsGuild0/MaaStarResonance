name: check

on:
  push:
    branches:
      - "**"
    paths:
      - ".github/workflows/check.yml"
      - "assets/**"
      - "**.py"
      - "docs/**"
      - "README.md"
      - "sidebars.js"
      - "docusaurus.config.js"
      - "package.json"
  pull_request:
    branches:
      - "**"
    paths:
      - ".github/workflows/check.yml"
      - "assets/**"
      - "**.py"
      - "docs/**"
      - "README.md"
      - "sidebars.js"
      - "docusaurus.config.js"
      - "package.json"
  workflow_dispatch:

jobs:
  resource_check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Install Node dependencies
        run: npm ci

      # pip install maafw
      - name: Install maafw
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade maafw --pre

      - name: Run docs check
        run: npm run docs:check

      - name: Check Resource
        run: |
          python scripts/check_resource.py ./assets/resource/base/
